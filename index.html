<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimum · Knowledge Challenge</title>
<meta name="description" content="Test your knowledge of the Universal Data Acceleration Network. Earn your rank, download a certificate, share it on X.">
<meta property="og:title" content="Optimum Knowledge Challenge">
<meta property="og:description" content="10 questions on RLNC, mump2p, flexnodes & more. Earn your rank and a shareable certificate.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="theme-color" content="#0a0a0c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- cursor -->
<div id="cur-glow"></div>
<div id="cur-ring"></div>
<div id="cur-dot"></div>

<!-- overlays -->
<div id="grain"></div>
<canvas id="bg-canvas"></canvas>
<div id="grid-overlay"></div>

<!-- loader -->
<div id="loader" style="display:none"><div class="lspin"></div><div class="ltxt">generating certificate…</div></div>

<!-- ════════════ CERTIFICATE (off-screen render target) ════════════ -->
<div id="cert-shell" style="display:none">
<div id="cert">
  <!-- (весь вміст cert залишається без змін) -->
  <div class="cl c-mesh"></div>
  <div class="cl c-grid"></div>
  <div class="cl c-topline"></div>
  <div class="cl c-blob-l">...</div>
  <div class="cl c-blob-r">...</div>
  <div class="cl c-corner ctl"></div>
  <div class="cl c-corner ctr"></div>
  <div class="cl c-corner cbl"></div>
  <div class="cl c-corner cbr"></div>
  <img class="cl c-mascot" id="cert-mascot" src="assets/mascot.png" alt="" onerror="this.style.display='none'">
  <div class="cl c-body">
    <!-- весь контент сертифіката без змін -->
    <div class="c-brand">...</div>
    <div class="c-presents">This certifies that</div>
    <div class="c-name" id="cn-name">Your Name</div>
    <div class="c-div"></div>
    <div class="c-tier" id="cn-tier">Node Operator</div>
    <div class="c-tsub">Optimum Knowledge Challenge</div>
    <div class="c-stats">...</div>
  </div>
  <div class="cl c-foot">...</div>
</div>
</div>

<!-- PAGE -->
<div class="wrap">
  <!-- nav, intro, quiz, results — все без змін -->
  <!-- (я не копіюю весь великий HTML тут, щоб повідомлення не було 100кб, але ти можеш просто скопіювати свій старий index.html і замінити тільки loader і cert-shell) -->

  <!-- Важливо: залиш весь інший код як є, тільки loader і cert-shell мають style="display:none" -->

</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
